<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact • nico</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&icon_names=account_box,alternate_email,arrow_back,check,code,content_copy,dark_mode,home,light_mode,mail,person,photo_camera"/>
</head>
<body>
    <a id="home-toggle" href="/index.html" aria-label="Go home">
        <span class="material-symbols-rounded">arrow_back</span>
    </a>

    <button id="theme-toggle" aria-label="Switch theme">
        <span id="theme-icon" class="material-symbols-rounded">dark_mode</span>
    </button>

    <div class="container">
        <p><span class="material-symbols-rounded">mail</span></p>
        <h1>contact</h1>
        <hr>

        <div class="content">
            <a href="#" class="home-button menu-link" data-contact-type="mail" data-contact-value="contact@nicojpeg.com" data-contact-mailto="mailto:contact@nicojpeg.com">
                <span class="material-symbols-rounded">alternate_email</span>mail
            </a>

            <a href="#" class="home-button menu-link" data-contact-type="discord" data-contact-value="@njpg">
                <span class="material-symbols-rounded">account_box</span>discord
            </a>
        </div>

        <hr style="margin-top: -5px;">
        <a href="/index.html" class="home-button menu-link">
            <span class="material-symbols-rounded">home</span>back to home
        </a>
    </div>

    <div id="image-popup" class="image-popup" aria-hidden="true">
        <img id="popup-image" class="popup-image" alt="Banner preview">
    </div>

    <div id="contact-popup" class="contact-popup" aria-hidden="true">
        <div class="contact-popup-card" role="dialog" aria-modal="true" aria-labelledby="contact-popup-title">
            <h2 id="contact-popup-title">mail</h2>
            <div class="contact-popup-code">
                <code id="contact-popup-value" class="contact-popup-value">contact@nicojpeg.com</code>
                <button id="contact-copy-button" type="button" class="contact-copy-icon" aria-label="Copy to clipboard">
                    <span id="contact-copy-icon" class="material-symbols-rounded">content_copy</span>
                </button>
            </div>

            <div class="contact-popup-actions">
                <a id="contact-send-button" class="contact-action" href="mailto:contact@nicojpeg.com">send email</a>
            </div>

            <button id="contact-close-button" type="button" class="contact-close">close</button>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
