<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&icon_names=code,dark_mode,light_mode,mail,person,photo_camera"/>
</head>
<body>
    <button id="theme-toggle" aria-label="Switch theme">
        <span id="theme-icon" class="material-symbols-rounded">dark_mode</span>
    </button>

    <div class="container">
        <img src="src/banner.jpg" alt="Banner" class="banner">
        <p>hi, i'm</p>
        <h1>nico</h1>
        <hr>

        <div class="menu">
            <a href="/about/" class="menu-link">
                <span class="material-symbols-rounded">person</span>
                about me
            </a>
            <a href="/projects/" class="menu-link">
                <span class="material-symbols-rounded">code</span>
                projects
            </a>
            <a href="/photography/" class="menu-link">
                <span class="material-symbols-rounded">photo_camera</span>
                photography
            </a>
            <a href="/contact/" class="menu-link">
                <span class="material-symbols-rounded">mail</span>
                contact
            </a>
        </div>
    </div>

    <div id="image-popup" class="image-popup" aria-hidden="true">
        <img id="popup-image" class="popup-image" alt="Banner preview">
    </div>

    <script src="script.js"></script>
</body>
</html>
