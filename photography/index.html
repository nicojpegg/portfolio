<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photography • nico</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&icon_names=arrow_back,code,dark_mode,home,light_mode,mail,person,photo_camera"/>
</head>
<body>
    <a id="home-toggle" href="/index.html" aria-label="Go home">
        <span class="material-symbols-rounded">arrow_back</span>
    </a>

    <button id="theme-toggle" aria-label="Switch theme">
        <span id="theme-icon" class="material-symbols-rounded">dark_mode</span>
    </button>

    <div class="container">
        <p><span class="material-symbols-rounded">photo_camera</span></p>
        <h1>photography</h1>
        <hr>

        <div class="content">
            <section class="photo-carousel" aria-label="Photography carousel">
                <div class="photo-stack" aria-label="Select photos">
                    <div class="photo-details is-open">
                        <button type="button" class="photo-summary" aria-expanded="true">
                            <img class="photo-image" src="/src/banner.jpg" alt="Moody city shot">
                        </button>
                    </div>

                    <div class="photo-details">
                        <button type="button" class="photo-summary" aria-expanded="false">
                            <img class="photo-image" src="/src/projects/cat-nicojpeg-tech.jpeg" alt="Cat portrait">
                        </button>
                    </div>

                    <div class="photo-details">
                        <button type="button" class="photo-summary" aria-expanded="false">
                            <img class="photo-image" src="/src/projects/html-css.png" alt="Graphic detail">
                        </button>
                    </div>

                    <div class="photo-details">
                        <button type="button" class="photo-summary" aria-expanded="false">
                            <img class="photo-image" src="/src/banner.jpg" alt="Street reflection">
                        </button>
                    </div>

                    <div class="photo-details">
                        <button type="button" class="photo-summary" aria-expanded="false">
                            <img class="photo-image" src="/src/projects/cat-nicojpeg-tech.jpeg" alt="Soft portrait">
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <a href="/photography/gallery/" class="menu-link home-button">
            <span class="material-symbols-rounded">photo_camera</span>open gallery
        </a>

        <a href="/index.html" class="home-button menu-link">
            <span class="material-symbols-rounded">home</span>back to home
        </a>
    </div>

    <div id="image-popup" class="image-popup" aria-hidden="true">
        <img id="popup-image" class="popup-image" alt="Banner preview">
    </div>

    <script src="/script.js"></script>
    <script src="carousel.js"></script>
</body>
</html>
