<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery • nico</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&icon_names=arrow_back,calendar_today,close,dark_mode,download,lens,light_mode,location_on,open_in_new,photo_camera"/>
</head>
<body>
    <header class="gallery-header">
        <a class="gallery-nav-btn" href="/photography/index.html" aria-label="Back to photography">
            <span class="material-symbols-rounded">arrow_back</span>
        </a>

        <h1 class="gallery-title">gallery</h1>

        <button id="theme-toggle" class="gallery-nav-btn" aria-label="Switch theme">
            <span id="theme-icon" class="material-symbols-rounded">dark_mode</span>
        </button>
    </header>

    <main class="gallery-main">
        <div class="photo-grid">
            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0010.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="18-135mm f/3.5-5.6"
                data-date="March 2026"
                data-location="Mannheim, Germany">
                <img src="/src/photography/proxy/0010.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0009.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="18-135mm f/3.5-5.6"
                data-date="December 2025"
                data-location="Strasbourg, France">
                <img src="/src/photography/proxy/0009.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0008.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="18-135mm f/3.5-5.6"
                data-date="December 2025"
                data-location="Strasbourg, France">
                <img src="/src/photography/proxy/0008.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0007.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="18-135mm f/3.5-5.6"
                data-date="December 2025"
                data-location="Strasbourg, France">
                <img src="/src/photography/proxy/0007.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0006.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="18-135mm f/3.5-5.6"
                data-date="December 2025"
                data-location="Strasbourg, France">
                <img src="/src/photography/proxy/0006.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0005.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="16-50mm f/3.5-5.6"
                data-date="October 2025"
                data-location="Salzburg, Austria">
                <img src="/src/photography/proxy/0005.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0004.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="16-50mm f/3.5-5.6"
                data-date="October 2025"
                data-location="Salzburg, Austria">
                <img src="/src/photography/proxy/0004.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0003.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="16-50mm f/3.5-5.6"
                data-date="August 2025"
                data-location="Dobbiaco, Italy">
                <img src="/src/photography/proxy/0003.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0002.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="16-50mm f/3.5-5.6"
                data-date="August 2025"
                data-location="Bressanone, Italy">
                <img src="/src/photography/proxy/0002.webp">
            </button>

            <button class="grid-item" type="button"
                data-raw="/src/photography/raw/0001.jpg"
                data-camera="Sony Alpha 6000"
                data-lens="16-50mm f/3.5-5.6"
                data-date="August 2025"
                data-location="Percha, Italy">
                <img src="/src/photography/proxy/0001.webp">
            </button>

        </div>
    </main>

    <div id="photo-popup" class="photo-popup" aria-hidden="true">
        <button class="popup-close" id="popup-close" aria-label="Close">
            <span class="material-symbols-rounded">close</span>
        </button>

        <div class="popup-inner">
            <div class="popup-image-wrap">
                <img id="popup-photo" class="popup-photo" src="" alt="">
            </div>

            <div class="popup-info">
                <div class="popup-meta">
                    <div class="popup-meta-row" id="popup-camera-row">
                        <span class="material-symbols-rounded">photo_camera</span>
                        <span id="popup-camera"></span>
                    </div>
                    <div class="popup-meta-row" id="popup-lens-row">
                        <span class="material-symbols-rounded">lens</span>
                        <span id="popup-lens"></span>
                    </div>
                    <div class="popup-meta-row" id="popup-date-row">
                        <span class="material-symbols-rounded">calendar_today</span>
                        <span id="popup-date"></span>
                    </div>
                    <div class="popup-meta-row" id="popup-location-row">
                        <span class="material-symbols-rounded">location_on</span>
                        <span id="popup-location"></span>
                    </div>
                </div>

                <div class="popup-actions">
                    <a id="popup-download" class="popup-btn" download aria-label="Download photo">
                        <span class="material-symbols-rounded">download</span>
                        Download
                    </a>
                    <a id="popup-open" class="popup-btn" target="_blank" rel="noopener noreferrer" aria-label="Open in new tab">
                        <span class="material-symbols-rounded">open_in_new</span>
                        Open
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
